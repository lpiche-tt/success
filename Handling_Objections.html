  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"37fe8b19-9c38-4479-be3c-0c6a4f8c9996\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  @font-face {\n    font-family: 'Rise';\n    src: url(\"fde55577-51c0-45c6-ac14-05a1c8c19619\") format('woff2-variations'), url(\"fde55577-51c0-45c6-ac14-05a1c8c19619\") format('woff2');\n    font-weight: 100 900; font-style: normal; font-display: swap;\n  }\n  * { box-sizing: border-box; }\n  html, body { margin: 0; height: 100%; font-family: 'Rise', -apple-system, BlinkMacSystemFont, sans-serif; color: #2f3033; background: #fafafa; -webkit-font-smoothing: antialiased; }\n  a { color: #009fd9; }\n  a:hover { color: #007fad; }\n  .scrollarea::-webkit-scrollbar { width: 10px; }\n  .scrollarea::-webkit-scrollbar-thumb { background: #e9eced; border-radius: 9999px; border: 3px solid #fafafa; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display: flex; height: 100vh; overflow: hidden; background: #fafafa;\">\n\n  <!-- ============ LEFT RAIL ============ -->\n  <aside style=\"width: 280px; flex-shrink: 0; background: #fff; border-right: 1px solid #e9eced; display: flex; flex-direction: column;\">\n    <div style=\"padding: 26px 24px 20px;\">\n      <img src=\"9205137d-3f63-4cb8-bd12-8768f66dcd3e\" alt=\"Thumbtack\" style=\"height: 20px; display: block;\">\n    <\u002Fdiv>\n    <div style=\"padding: 0 24px 18px;\">\n      <div style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #979ba0;\">Onboarding<\u002Fdiv>\n      <div style=\"font-size: 15px; font-weight: 700; color: #2f3033; margin-top: 3px;\">Handling objections<\u002Fdiv>\n      <div style=\"margin-top: 14px; height: 6px; border-radius: 9999px; background: #e9eced; overflow: hidden;\">\n        <div style=\"{{ progressBarStyle }}\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size: 12px; color: #676d73; margin-top: 7px;\">{{ progressLabel }}<\u002Fdiv>\n    <\u002Fdiv>\n    <nav class=\"scrollarea\" style=\"flex: 1; overflow-y: auto; padding: 6px 14px 20px;\">\n      <sc-for list=\"{{ railChapters }}\" as=\"c\" hint-placeholder-count=\"9\">\n        <div style=\"margin-bottom: 2px;\">\n          <button style=\"{{ c.rowStyle }}\" sc-camel-on-click=\"{{ c.onClick }}\">\n            <span style=\"{{ c.dotStyle }}\">{{ c.dotText }}<\u002Fspan>\n            <span style=\"{{ c.textStyle }}\">{{ c.title }}<\u002Fspan>\n          <\u002Fbutton>\n          <sc-if value=\"{{ c.expanded }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin: 2px 0 6px 30px; display: flex; flex-direction: column; gap: 1px; border-left: 1px solid #e9eced; padding-left: 8px;\">\n              <sc-for list=\"{{ c.subs }}\" as=\"s\" hint-placeholder-count=\"3\">\n                <button style=\"{{ s.style }}\" sc-camel-on-click=\"{{ s.onClick }}\">\n                  <span style=\"{{ s.dotStyle }}\"><\u002Fspan>\n                  <span style=\"flex: 1; text-align: left;\">{{ s.title }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fnav>\n  <\u002Faside>\n\n  <!-- ============ MAIN ============ -->\n  <main style=\"flex: 1; display: flex; flex-direction: column; min-width: 0;\">\n    <div class=\"scrollarea\" style=\"flex: 1; overflow-y: auto;\">\n      <div style=\"max-width: 720px; margin: 0 auto; padding: 52px 40px 40px;\">\n\n        <!-- eyebrow shown on every step -->\n        <div style=\"font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #009fd9; margin-bottom: 12px;\">{{ stepEyebrow }}<\u002Fdiv>\n\n        <!-- ===== welcome ===== -->\n        <sc-if value=\"{{ show.welcome }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <h1 style=\"margin: 0 0 18px; font-size: 40px; line-height: 1.08; font-weight: 800; letter-spacing: -0.02em;\">An objection is a signal, not a stop sign.<\u002Fh1>\n            <p style=\"margin: 0 0 16px; font-size: 18px; line-height: 1.6; color: #414449;\">Objections aren't random interruptions. They're signals about what someone is unsure about, worried about, or resisting. A stronger response doesn't try to \"win\" the objection — it helps you understand the concern underneath and keep the conversation human, relevant, and moving forward.<\u002Fp>\n            <p style=\"margin: 0 0 32px; font-size: 16px; line-height: 1.6; color: #676d73;\">This lesson takes about 45 minutes. Move at your own pace — your progress saves as you go.<\u002Fp>\n            <div style=\"background: #fff; border: 1px solid #e9eced; border-radius: 12px; padding: 26px 28px;\">\n              <div style=\"font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #009fd9;\">By the end, you'll be able to<\u002Fdiv>\n              <div style=\"display: flex; flex-direction: column; gap: 14px; margin-top: 18px;\">\n                <sc-for list=\"{{ objectives }}\" as=\"o\" hint-placeholder-count=\"5\">\n                  <div style=\"display: flex; gap: 14px; align-items: flex-start;\">\n                    <span style=\"flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%; background: #eaf6fa; color: #005979; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700;\">{{ o.n }}<\u002Fspan>\n                    <span style=\"font-size: 15px; line-height: 1.5; color: #2f3033; padding-top: 2px;\">{{ o.text }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== why_reasons ===== -->\n        <sc-if value=\"{{ show.why_reasons }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 14px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">Three reasons objections happen<\u002Fh2>\n            <p style=\"margin: 0 0 26px; font-size: 17px; line-height: 1.6; color: #414449;\">Objections almost always come from one of three places. When you understand why one is happening, you can respond to the real concern — not just the words on the surface.<\u002Fp>\n            <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;\">\n              <sc-for list=\"{{ causes }}\" as=\"c\" hint-placeholder-count=\"3\">\n                <div style=\"background: #fff; border: 1px solid #e9eced; border-radius: 12px; padding: 20px; border-top: 3px solid #009fd9;\">\n                  <div style=\"font-size: 16px; font-weight: 700; line-height: 1.25; margin-bottom: 8px;\">{{ c.title }}<\u002Fdiv>\n                  <div style=\"font-size: 13px; line-height: 1.5; color: #676d73;\">{{ c.body }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== why_objVsRej ===== -->\n        <sc-if value=\"{{ show.why_objVsRej }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 8px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">Objection vs. rejection<\u002Fh2>\n            <p style=\"margin: 0 0 20px; font-size: 17px; line-height: 1.6; color: #414449;\">One of the most common mistakes is treating an objection like a rejection. They're not the same. Tap each card to see the difference.<\u002Fp>\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;\">\n              <sc-for list=\"{{ objRejCards }}\" as=\"card\" hint-placeholder-count=\"2\">\n                <div style=\"height: 240px; cursor: pointer; perspective: 1200px;\" sc-camel-on-click=\"{{ card.onToggle }}\">\n                  <div style=\"{{ card.innerStyle }}\">\n                    <div style=\"position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; background: #fff; border: 1px solid #e9eced; border-radius: 14px; padding: 22px; display: flex; flex-direction: column;\">\n                      <div style=\"{{ card.frontTagStyle }}\">{{ card.frontTag }}<\u002Fdiv>\n                      <div style=\"font-size: 20px; font-weight: 800; margin-top: 12px;\">{{ card.frontTitle }}<\u002Fdiv>\n                      <div style=\"font-size: 14px; line-height: 1.5; color: #676d73; margin-top: 8px; flex: 1;\">{{ card.frontBody }}<\u002Fdiv>\n                      <div style=\"font-size: 12px; font-weight: 700; color: #009fd9;\">Tap to flip →<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"{{ card.backFaceStyle }}\">\n                      <div style=\"{{ card.backTagStyle }}\">{{ card.backTag }}<\u002Fdiv>\n                      <div style=\"display: flex; flex-direction: column; gap: 7px; margin-top: 14px;\">\n                        <sc-for list=\"{{ card.lines }}\" as=\"ln\" hint-placeholder-count=\"3\">\n                          <div style=\"font-size: 14px; line-height: 1.4;\">{{ ln }}<\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"background: #eaf6fa; border-radius: 12px; padding: 18px 20px; font-size: 15px; line-height: 1.55; color: #005979;\">Responding to an objection as if it were a rejection shuts down a conversation that didn't need to end. Read the signal correctly first.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== why_mindset ===== -->\n        <sc-if value=\"{{ show.why_mindset }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 8px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">The right mindset<\u002Fh2>\n            <p style=\"margin: 0 0 18px; font-size: 17px; line-height: 1.6; color: #414449;\">Objections can feel personal — but they aren't. Before you respond, get into the right headspace.<\u002Fp>\n            <div style=\"display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;\">\n              <sc-for list=\"{{ mindsetPoints }}\" as=\"m\" hint-placeholder-count=\"3\">\n                <div style=\"display: flex; gap: 12px; align-items: flex-start; background: #fff; border: 1px solid #e9eced; border-radius: 10px; padding: 14px 16px;\">\n                  <span style=\"flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; background: #e1fdf3; color: #16855b; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800;\">✓<\u002Fspan>\n                  <div><span style=\"font-size: 15px; font-weight: 700;\">{{ m.head }}<\u002Fspan> <span style=\"font-size: 15px; color: #676d73;\">{{ m.body }}<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 14px;\">\n              <div style=\"background: #fff; border: 1px solid #e9eced; border-radius: 12px; padding: 18px 20px;\">\n                <div style=\"font-size: 13px; font-weight: 700; color: #b22d31; margin-bottom: 10px;\">Sometimes it feels like…<\u002Fdiv>\n                <div style=\"font-size: 14px; line-height: 1.7; color: #676d73;\">Unsure of what to say next<br>Nervous about losing the person<br>Frustrated or defensive<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background: #fff; border: 1px solid #e9eced; border-radius: 12px; padding: 18px 20px;\">\n                <div style=\"font-size: 13px; font-weight: 700; color: #16855b; margin-bottom: 10px;\">The goal is to feel…<\u002Fdiv>\n                <div style=\"font-size: 14px; line-height: 1.7; color: #2f3033;\">Confident in your framework<br>Curious about what's underneath<br>Ready to help — not to win<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== adrc_simple ===== -->\n        <sc-if value=\"{{ show.adrc_simple }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 14px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">A simple way to handle objections<\u002Fh2>\n            <p style=\"margin: 0 0 24px; font-size: 17px; line-height: 1.6; color: #414449;\">When someone hesitates or pushes back, a simple mental model helps you stay grounded. It's not a script — it's a way to think clearly in the moment.<\u002Fp>\n            <div style=\"display: flex; flex-direction: column; gap: 12px; margin-bottom: 26px;\">\n              <sc-for list=\"{{ simpleSteps }}\" as=\"s\" hint-placeholder-count=\"3\">\n                <div style=\"display: flex; gap: 16px; align-items: flex-start; background: #fff; border: 1px solid #e9eced; border-radius: 12px; padding: 18px 20px;\">\n                  <span style=\"flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; background: #eaf6fa; color: #005979; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800;\">{{ s.n }}<\u002Fspan>\n                  <div><div style=\"font-size: 16px; font-weight: 700;\">{{ s.head }}<\u002Fdiv><div style=\"font-size: 14px; line-height: 1.5; color: #676d73; margin-top: 2px;\">{{ s.body }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"background: #eaf6fa; border-radius: 12px; padding: 16px 20px; font-size: 15px; line-height: 1.55; color: #005979;\">A framework helps you think clearly — it is not a script. Next, we'll turn this instinct into a repeatable one: ADRC.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== adrc_framework ===== -->\n        <sc-if value=\"{{ show.adrc_framework }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 14px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">The ADRC framework<\u002Fh2>\n            <p style=\"margin: 0 0 22px; font-size: 17px; line-height: 1.6; color: #414449;\">When someone raises an objection, ADRC keeps you grounded. It's not a script — it's a way to think clearly. Each step builds on the last. Tap a step to explore it.<\u002Fp>\n            <div style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px;\">\n              <sc-for list=\"{{ adrcTabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n                <button style=\"{{ t.style }}\" sc-camel-on-click=\"{{ t.onClick }}\">\n                  <span style=\"{{ t.letterStyle }}\">{{ t.letter }}<\u002Fspan>\n                  <span style=\"{{ t.nameStyle }}\">{{ t.name }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"background: #fff; border: 1px solid #e9eced; border-radius: 14px; padding: 26px 28px; min-height: 150px;\">\n              <div style=\"display: flex; align-items: center; gap: 12px;\">\n                <span style=\"width: 40px; height: 40px; border-radius: 10px; background: #009fd9; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800;\">{{ adrcDetail.letter }}<\u002Fspan>\n                <span style=\"font-size: 22px; font-weight: 800;\">{{ adrcDetail.name }}<\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"margin: 16px 0 0; font-size: 16px; line-height: 1.6; color: #414449;\">{{ adrcDetail.body }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== adrc_confirm ===== -->\n        <sc-if value=\"{{ show.adrc_confirm }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 14px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">The Confirm step<\u002Fh2>\n            <div style=\"background: #fdf7e7; border-left: 4px solid #febe14; border-radius: 8px; padding: 18px 20px; margin-bottom: 26px;\">\n              <div style=\"font-size: 14px; font-weight: 700; color: #714601; margin-bottom: 4px;\">Don't skip it.<\u002Fdiv>\n              <div style=\"font-size: 15px; line-height: 1.55; color: #714601;\">Confirm is the most commonly skipped step — and the most important. If you don't check that the concern is resolved, you risk moving forward while the customer is still stuck.<\u002Fdiv>\n            <\u002Fdiv>\n            <h3 style=\"margin: 0 0 12px; font-size: 20px; font-weight: 800;\">What Confirm sounds like<\u002Fh3>\n            <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n              <sc-for list=\"{{ confirmExamples }}\" as=\"e\" hint-placeholder-count=\"3\">\n                <div style=\"background: #fff; border: 1px solid #e9eced; border-radius: 10px; padding: 13px 16px; font-size: 15px;\">\"{{ e }}\"<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== adrc_consultant ===== -->\n        <sc-if value=\"{{ show.adrc_consultant }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 18px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">Be a consultant, not a seller<\u002Fh2>\n            <div style=\"background: #2f3033; border-radius: 14px; padding: 28px 30px;\">\n              <div style=\"font-size: 24px; font-weight: 800; color: #fff; line-height: 1.3;\">A seller talks <em>at<\u002Fem> someone. A consultant talks <em>with<\u002Fem> them.<\u002Fdiv>\n              <p style=\"margin: 14px 0 0; font-size: 16px; line-height: 1.6; color: #d3d4d5;\">When someone objects, they aren't rejecting you — they're inviting you to prove the value you're promising. Your job is to listen, understand the real issue beneath the surface, and guide them to the right conclusion.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== tone ===== -->\n        <sc-if value=\"{{ show.tone }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 14px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">Tone &amp; language<\u002Fh2>\n            <p style=\"margin: 0 0 24px; font-size: 17px; line-height: 1.6; color: #414449;\">The words you choose matter as much as the idea behind them. Small choices make a response feel helpful — or dismissive.<\u002Fp>\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;\">\n              <div style=\"background: #fff; border: 1px solid #ffd9d9; border-radius: 12px; padding: 20px 22px;\">\n                <div style=\"font-size: 14px; font-weight: 700; color: #b22d31; margin-bottom: 14px;\">Avoid these<\u002Fdiv>\n                <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n                  <sc-for list=\"{{ avoidList }}\" as=\"a\" hint-placeholder-count=\"5\">\n                    <div><div style=\"font-size: 15px; font-weight: 700;\">\"{{ a.phrase }}\"<\u002Fdiv><div style=\"font-size: 13px; color: #676d73; line-height: 1.4;\">{{ a.why }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background: #fff; border: 1px solid #c6f7da; border-radius: 12px; padding: 20px 22px;\">\n                <div style=\"font-size: 14px; font-weight: 700; color: #16855b; margin-bottom: 14px;\">Use these instead<\u002Fdiv>\n                <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n                  <sc-for list=\"{{ useList }}\" as=\"u\" hint-placeholder-count=\"5\">\n                    <div><div style=\"font-size: 15px; font-weight: 700;\">\"{{ u.phrase }}\"<\u002Fdiv><div style=\"font-size: 13px; color: #676d73; line-height: 1.4;\">{{ u.why }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background: #eaf6fa; border-radius: 12px; padding: 16px 20px; font-size: 15px; line-height: 1.5; color: #005979;\">Tone isn't just what you say — it's the posture behind the words. Stay curious, not defensive.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== signal_patterns ===== -->\n        <sc-if value=\"{{ show.signal_patterns }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 8px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">The three core patterns<\u002Fh2>\n            <p style=\"margin: 0 0 22px; font-size: 17px; line-height: 1.6; color: #414449;\">Most objections aren't unique — they cluster around a few root causes. The words vary, but the signal usually falls into one of these.<\u002Fp>\n            <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n              <sc-for list=\"{{ corePatterns }}\" as=\"p\" hint-placeholder-count=\"3\">\n                <div style=\"display: flex; gap: 16px; align-items: flex-start; background: #fff; border: 1px solid #e9eced; border-radius: 12px; padding: 18px 20px; border-left: 4px solid #009fd9;\">\n                  <span style=\"flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: #eaf6fa; color: #005979; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800;\">{{ p.n }}<\u002Fspan>\n                  <div>\n                    <div style=\"font-size: 16px; font-weight: 700;\">{{ p.title }}<\u002Fdiv>\n                    <div style=\"font-size: 14px; color: #414449; font-style: italic; margin: 2px 0 4px;\">{{ p.quote }}<\u002Fdiv>\n                    <div style=\"font-size: 14px; line-height: 1.5; color: #676d73;\">{{ p.body }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== signal_roots ===== -->\n        <sc-if value=\"{{ show.signal_roots }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 8px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">Root causes to check for<\u002Fh2>\n            <p style=\"margin: 0 0 22px; font-size: 17px; line-height: 1.6; color: #414449;\">When you hear an objection, ask: which of these is most likely driving it? That's your starting point.<\u002Fp>\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n              <sc-for list=\"{{ rootCauses }}\" as=\"r\" hint-placeholder-count=\"4\">\n                <div style=\"background: #fff; border: 1px solid #e9eced; border-radius: 12px; padding: 18px 20px;\">\n                  <div style=\"{{ r.tagStyle }}\">{{ r.tag }}<\u002Fdiv>\n                  <div style=\"font-size: 16px; font-weight: 700; margin: 8px 0 6px;\">{{ r.title }}<\u002Fdiv>\n                  <div style=\"font-size: 13px; line-height: 1.5; color: #676d73;\">{{ r.body }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== signal_common ===== -->\n        <sc-if value=\"{{ show.signal_common }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 8px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">Common objections &amp; strong responses<\u002Fh2>\n            <p style=\"margin: 0 0 20px; font-size: 17px; line-height: 1.6; color: #414449;\">Objections you'll hear regularly — what each is signaling, and a response that keeps things moving.<\u002Fp>\n            <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n              <sc-for list=\"{{ commonObjRows }}\" as=\"row\" hint-placeholder-count=\"4\">\n                <div style=\"background: #fff; border: 1px solid #e9eced; border-radius: 12px; padding: 18px 20px;\">\n                  <div style=\"display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px;\">\n                    <span style=\"font-size: 15px; font-weight: 700;\">\"{{ row.obj }}\"<\u002Fspan>\n                    <span style=\"{{ row.signalStyle }}\">{{ row.signal }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-size: 14px; line-height: 1.5; color: #414449;\"><span style=\"color: #16855b; font-weight: 700;\">Strong response · <\u002Fspan>{{ row.resp }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== scenarios ===== -->\n        <sc-if value=\"{{ show.scenarios }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 12px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">Practice scenarios<\u002Fh2>\n            <p style=\"margin: 0 0 26px; font-size: 17px; line-height: 1.6; color: #414449;\">You've acknowledged the concern in each of these. Choose the response that best moves the conversation forward, then submit to see how it lands.<\u002Fp>\n            <sc-if value=\"{{ scenActive }}\" hint-placeholder-val=\"{{ true }}\">\n              <div>\n                <div style=\"display: flex; align-items: center; gap: 12px; margin-bottom: 22px;\">\n                  <div style=\"display: flex; gap: 8px; flex-wrap: wrap;\">\n                    <sc-for list=\"{{ scenProgress }}\" as=\"p\" hint-placeholder-count=\"4\">\n                      <div style=\"{{ p.style }}\">{{ p.mark }}<\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <span style=\"margin-left: auto; font-size: 13px; font-weight: 700; color: #676d73;\">{{ scenNum }} of {{ scenTotal }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"background: #fff; border: 1px solid #e9eced; border-radius: 14px; padding: 26px 28px;\">\n                  <div style=\"font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: #979ba0;\">Scenario {{ scenNum }}<\u002Fdiv>\n                  <div style=\"font-size: 19px; font-weight: 700; margin: 8px 0 6px; line-height: 1.35;\">\"{{ scenQuote }}\"<\u002Fdiv>\n                  <div style=\"font-size: 15px; color: #676d73; margin-bottom: 18px; line-height: 1.5;\">{{ scenPrompt }}<\u002Fdiv>\n                  <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n                    <sc-for list=\"{{ scenOptions }}\" as=\"o\" hint-placeholder-count=\"4\">\n                      <div>\n                        <button style=\"{{ o.style }}\" sc-camel-on-click=\"{{ o.onPick }}\">\n                          <span style=\"{{ o.markStyle }}\">{{ o.mark }}<\u002Fspan>\n                          <span style=\"flex: 1; text-align: left;\">{{ o.text }}<\u002Fspan>\n                        <\u002Fbutton>\n                        <sc-if value=\"{{ o.showFb }}\" hint-placeholder-val=\"{{ false }}\">\n                          <div style=\"{{ o.fbStyle }}\">{{ o.explain }}<\u002Fdiv>\n                        <\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <button style=\"{{ scenBtnStyle }}\" sc-camel-on-click=\"{{ onScenBtn }}\">{{ scenBtnLabel }}<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ scenFinished }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background: #009fd9; border-radius: 16px; padding: 28px 30px; color: #fff;\">\n                <div style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.85;\">{{ scenResultKicker }}<\u002Fdiv>\n                <div style=\"font-size: 44px; font-weight: 800; margin: 6px 0 2px;\">{{ scenScore }} / {{ scenTotal }}<\u002Fdiv>\n                <div style=\"font-size: 16px; opacity: 0.92; line-height: 1.5;\">{{ scenResultMsg }}<\u002Fdiv>\n                <button style=\"margin-top: 16px; background: #fff; color: #2f3033; border: none; border-radius: 9999px; padding: 11px 22px; font-size: 14px; font-weight: 700; cursor: pointer;\" sc-camel-on-click=\"{{ onScenReset }}\">Try again<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== live ===== -->\n        <sc-if value=\"{{ show.live }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 10px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">Live conversation<\u002Fh2>\n            <p style=\"margin: 0 0 18px; font-size: 17px; line-height: 1.6; color: #414449;\">A customer just said the lead costs are too high. Walk the full ADRC framework — choose a reply at each step and see how the conversation moves.<\u002Fp>\n            <div style=\"display: flex; gap: 8px; margin-bottom: 18px;\">\n              <sc-for list=\"{{ adrcChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n                <div style=\"{{ c.style }}\">{{ c.label }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"background: #fff; border: 1px solid #e9eced; border-radius: 16px; overflow: hidden; box-shadow: 0px 2px 10px rgba(0,0,0,0.06);\">\n              <div style=\"background: #fafafa; border-bottom: 1px solid #e9eced; padding: 14px 20px; display: flex; align-items: center; gap: 12px;\">\n                <span style=\"width: 36px; height: 36px; border-radius: 50%; background: #dfccff; color: #6637b6; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700;\">MR<\u002Fspan>\n                <div><div style=\"font-size: 15px; font-weight: 700;\">Marcus R.<\u002Fdiv><div style=\"font-size: 12px; color: #676d73;\">Pro · Handyman<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding: 22px 20px; display: flex; flex-direction: column; gap: 12px; min-height: 220px;\">\n                <sc-for list=\"{{ chatMsgs }}\" as=\"m\" hint-placeholder-count=\"1\">\n                  <div style=\"{{ m.rowStyle }}\">\n                    <div style=\"{{ m.bubbleStyle }}\">{{ m.text }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"border-top: 1px solid #e9eced; padding: 18px 20px;\">\n                <sc-if value=\"{{ chatDone }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"text-align: center;\">\n                    <div style=\"display: inline-flex; align-items: center; gap: 8px; background: #e1fdf3; color: #16855b; border-radius: 9999px; padding: 8px 16px; font-size: 14px; font-weight: 700;\">You worked the full framework<\u002Fdiv>\n                    <p style=\"margin: 14px 0 16px; font-size: 15px; line-height: 1.55; color: #414449;\">You acknowledged the concern, drilled into what \"too expensive\" really meant, responded to the actual issue, and confirmed before moving on. That's ADRC.<\u002Fp>\n                    <button style=\"background: #fff; border: 1.5px solid #009fd9; color: #007fad; border-radius: 9999px; padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer;\" sc-camel-on-click=\"{{ onResetChat }}\">Try again<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ chatActive }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div>\n                    <div style=\"font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: #009fd9; margin-bottom: 10px;\">Your move — {{ chatStepName }}<\u002Fdiv>\n                    <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n                      <sc-for list=\"{{ chatOptions }}\" as=\"o\" hint-placeholder-count=\"3\">\n                        <button style=\"{{ o.style }}\" sc-camel-on-click=\"{{ o.onPick }}\">{{ o.text }}<\u002Fbutton>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <sc-if value=\"{{ chatTipShow }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"margin-top: 12px; background: #fdf7e7; border-radius: 8px; padding: 12px 14px; font-size: 14px; line-height: 1.45; color: #714601;\">{{ chatTip }}<\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== bring_spot ===== -->\n        <sc-if value=\"{{ show.bring_spot }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 8px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">Spot the mistake<\u002Fh2>\n            <p style=\"margin: 0 0 20px; font-size: 17px; line-height: 1.6; color: #414449;\">Each card shows a real response. Tap to see what went wrong — and what to do instead.<\u002Fp>\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px;\">\n              <sc-for list=\"{{ spotCards }}\" as=\"card\" hint-placeholder-count=\"3\">\n                <div style=\"height: 268px; cursor: pointer; perspective: 1200px;\" sc-camel-on-click=\"{{ card.onToggle }}\">\n                  <div style=\"{{ card.innerStyle }}\">\n                    <div style=\"position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; background: #fff; border: 1px solid #e9eced; border-radius: 14px; padding: 20px; display: flex; flex-direction: column;\">\n                      <div style=\"font-size: 12px; font-weight: 700; color: #676d73;\">Customer says<\u002Fdiv>\n                      <div style=\"font-size: 15px; font-weight: 700; margin: 6px 0 12px; line-height: 1.35;\">\"{{ card.said }}\"<\u002Fdiv>\n                      <div style=\"font-size: 12px; font-weight: 700; color: #676d73;\">Specialist responds<\u002Fdiv>\n                      <div style=\"font-size: 14px; line-height: 1.45; color: #414449; margin-top: 6px; flex: 1;\">\"{{ card.reply }}\"<\u002Fdiv>\n                      <div style=\"font-size: 12px; font-weight: 700; color: #009fd9;\">Tap to see the fix →<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; transform: rotateY(180deg); background: #2f3033; border-radius: 14px; padding: 20px; display: flex; flex-direction: column;\">\n                      <div style=\"font-size: 12px; font-weight: 700; color: #ff8f92;\">Mistake · {{ card.mistake }}<\u002Fdiv>\n                      <div style=\"font-size: 13px; line-height: 1.45; color: #d3d4d5; margin: 8px 0 12px;\">{{ card.why }}<\u002Fdiv>\n                      <div style=\"font-size: 12px; font-weight: 700; color: #73e4a2;\">Better<\u002Fdiv>\n                      <div style=\"font-size: 14px; line-height: 1.45; color: #fff; margin-top: 6px; flex: 1;\">\"{{ card.better }}\"<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== bring_sw ===== -->\n        <sc-if value=\"{{ show.bring_sw }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 8px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">Stronger vs. weaker responses<\u002Fh2>\n            <p style=\"margin: 0 0 20px; font-size: 17px; line-height: 1.6; color: #414449;\">Same objection, two responses. Tap to compare what makes one land and the other fall flat.<\u002Fp>\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px;\">\n              <sc-for list=\"{{ swCards }}\" as=\"card\" hint-placeholder-count=\"4\">\n                <div style=\"height: 250px; cursor: pointer; perspective: 1200px;\" sc-camel-on-click=\"{{ card.onToggle }}\">\n                  <div style=\"{{ card.innerStyle }}\">\n                    <div style=\"position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; background: #fff; border: 1px solid #e9eced; border-radius: 14px; padding: 22px; display: flex; flex-direction: column; justify-content: center;\">\n                      <div style=\"font-size: 12px; font-weight: 700; color: #676d73;\">Customer says<\u002Fdiv>\n                      <div style=\"font-size: 18px; font-weight: 700; margin: 8px 0; line-height: 1.35;\">\"{{ card.quote }}\"<\u002Fdiv>\n                      <div style=\"font-size: 12px; font-weight: 700; color: #009fd9;\">Tap to compare →<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; transform: rotateY(180deg); background: #fff; border: 1px solid #e9eced; border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 10px; justify-content: center;\">\n                      <div style=\"background: #e1fdf3; border-radius: 10px; padding: 12px 14px;\">\n                        <div style=\"font-size: 12px; font-weight: 700; color: #16855b;\">Stronger<\u002Fdiv>\n                        <div style=\"font-size: 13px; line-height: 1.4; color: #054e33; margin-top: 4px;\">\"{{ card.stronger }}\"<\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"background: #ffeff0; border-radius: 10px; padding: 12px 14px;\">\n                        <div style=\"font-size: 12px; font-weight: 700; color: #b22d31;\">Weaker<\u002Fdiv>\n                        <div style=\"font-size: 13px; line-height: 1.4; color: #7d0d10; margin-top: 4px;\">\"{{ card.weaker }}\"<\u002Fdiv>\n                        <div style=\"font-size: 12px; color: #b22d31; margin-top: 4px;\">{{ card.weakWhy }}<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== bring_recover ===== -->\n        <sc-if value=\"{{ show.bring_recover }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 8px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">Recover when it goes sideways<\u002Fh2>\n            <p style=\"margin: 0 0 20px; font-size: 17px; line-height: 1.6; color: #414449;\">It happens — you defend when you should listen, or over-explain when you should ask. Here's how to reset without making it worse.<\u002Fp>\n            <div style=\"display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;\">\n              <sc-for list=\"{{ recoverySteps }}\" as=\"r\" hint-placeholder-count=\"3\">\n                <div style=\"display: flex; gap: 14px; background: #fff; border: 1px solid #e9eced; border-radius: 12px; padding: 16px 18px;\">\n                  <span style=\"flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: #eaf6fa; color: #005979; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800;\">{{ r.n }}<\u002Fspan>\n                  <div><div style=\"font-size: 15px; font-weight: 700;\">{{ r.head }}<\u002Fdiv><div style=\"font-size: 14px; line-height: 1.5; color: #676d73; margin-top: 2px;\">{{ r.body }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"background: #e1fdf3; border-radius: 12px; padding: 16px 20px; font-size: 15px; line-height: 1.55; color: #054e33;\">A recovery handled well can strengthen trust more than a conversation that never went wrong. It shows the customer you're paying attention and care about getting it right.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== bring_recap ===== -->\n        <sc-if value=\"{{ show.bring_recap }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 18px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">Five things to remember<\u002Fh2>\n            <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n              <sc-for list=\"{{ takeaways }}\" as=\"t\" hint-placeholder-count=\"5\">\n                <div style=\"display: flex; gap: 12px; align-items: flex-start; background: #fff; border: 1px solid #e9eced; border-radius: 10px; padding: 14px 16px;\">\n                  <span style=\"flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: #eaf6fa; color: #005979; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800;\">{{ t.n }}<\u002Fspan>\n                  <span style=\"font-size: 15px; line-height: 1.5;\">{{ t.text }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== quiz ===== -->\n        <sc-if value=\"{{ show.quiz }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 10px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">Show what you know<\u002Fh2>\n            <p style=\"margin: 0 0 24px; font-size: 17px; line-height: 1.6; color: #414449;\">Nine questions. Get at least 7 correct to pass. Submit each answer to see feedback, then continue.<\u002Fp>\n            <sc-if value=\"{{ quizActive }}\" hint-placeholder-val=\"{{ true }}\">\n              <div>\n                <div style=\"display: flex; align-items: center; gap: 12px; margin-bottom: 22px;\">\n                  <div style=\"display: flex; gap: 7px; flex-wrap: wrap;\">\n                    <sc-for list=\"{{ quizProgress }}\" as=\"p\" hint-placeholder-count=\"9\">\n                      <div style=\"{{ p.style }}\">{{ p.mark }}<\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <span style=\"margin-left: auto; font-size: 13px; font-weight: 700; color: #676d73;\">{{ quizNum }} of {{ quizTotal }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"background: #fff; border: 1px solid #e9eced; border-radius: 14px; padding: 26px 28px;\">\n                  <div style=\"display: flex; gap: 10px; align-items: baseline;\">\n                    <span style=\"font-size: 13px; font-weight: 800; color: #009fd9;\">{{ quizNum }}<\u002Fspan>\n                    <div style=\"font-size: 18px; font-weight: 700; line-height: 1.4;\">{{ quizPrompt }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-size: 12px; color: #979ba0; margin: 4px 0 16px 22px;\">{{ quizHint }}<\u002Fdiv>\n                  <div style=\"display: flex; flex-direction: column; gap: 9px;\">\n                    <sc-for list=\"{{ quizOptions }}\" as=\"o\" hint-placeholder-count=\"3\">\n                      <div>\n                        <button style=\"{{ o.style }}\" sc-camel-on-click=\"{{ o.onPick }}\">\n                          <span style=\"{{ o.boxStyle }}\">{{ o.box }}<\u002Fspan>\n                          <span style=\"flex: 1; text-align: left;\">{{ o.text }}<\u002Fspan>\n                          <span style=\"{{ o.markStyle }}\">{{ o.mark }}<\u002Fspan>\n                        <\u002Fbutton>\n                        <sc-if value=\"{{ o.showFb }}\" hint-placeholder-val=\"{{ false }}\">\n                          <div style=\"{{ o.fbStyle }}\">{{ o.explain }}<\u002Fdiv>\n                        <\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <button style=\"{{ quizBtnStyle }}\" sc-camel-on-click=\"{{ onQuizBtn }}\">{{ quizBtnLabel }}<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ quizFinished }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"{{ resultCardStyle }}\">\n                <div style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.85;\">{{ resultKicker }}<\u002Fdiv>\n                <div style=\"font-size: 44px; font-weight: 800; margin: 6px 0 2px;\">{{ quizScore }} / {{ quizTotal }}<\u002Fdiv>\n                <div style=\"font-size: 16px; opacity: 0.92; line-height: 1.5;\">{{ resultMessage }}<\u002Fdiv>\n                <button style=\"margin-top: 16px; background: #fff; color: #2f3033; border: none; border-radius: 9999px; padding: 11px 22px; font-size: 14px; font-weight: 700; cursor: pointer;\" sc-camel-on-click=\"{{ onResetQuiz }}\">Retake the check<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== wrapup ===== -->\n        <sc-if value=\"{{ show.wrapup }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h2 style=\"margin: 0 0 14px; font-size: 30px; line-height: 1.15; font-weight: 800; letter-spacing: -0.015em;\">You've got this<\u002Fh2>\n            <p style=\"margin: 0 0 28px; font-size: 17px; line-height: 1.6; color: #414449;\">You've worked through what objections really are, a framework for handling them, and the tone that keeps conversations human. Here's the whole course in five ideas.<\u002Fp>\n            <div style=\"display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px;\">\n              <sc-for list=\"{{ wrapPoints }}\" as=\"t\" hint-placeholder-count=\"5\">\n                <div style=\"display: flex; gap: 14px; align-items: flex-start; background: #fff; border: 1px solid #e9eced; border-radius: 12px; padding: 16px 18px;\">\n                  <span style=\"flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: #eaf6fa; color: #005979; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800;\">{{ t.n }}<\u002Fspan>\n                  <span style=\"font-size: 15px; line-height: 1.5; padding-top: 3px;\">{{ t.text }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"background: #fff; border: 1px solid #e9eced; border-radius: 16px; padding: 28px 30px; text-align: center;\">\n              <sc-if value=\"{{ completePending }}\" hint-placeholder-val=\"{{ true }}\">\n                <div>\n                  <div style=\"font-size: 20px; font-weight: 800; margin-bottom: 6px;\">Ready to finish?<\u002Fdiv>\n                  <div style=\"font-size: 15px; line-height: 1.55; color: #676d73; margin-bottom: 6px;\">Mark this course complete to record it in your learning record.<\u002Fdiv>\n                  <div style=\"font-size: 13px; color: #979ba0; margin-bottom: 18px;\">{{ wrapQuizLine }}<\u002Fdiv>\n                  <button style=\"background: #009fd9; color: #fff; border: none; border-radius: 9999px; padding: 14px 32px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;\" sc-camel-on-click=\"{{ onMarkComplete }}\">Mark course as completed<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ courseCompleted }}\" hint-placeholder-val=\"{{ false }}\">\n                <div>\n                  <div style=\"width: 56px; height: 56px; margin: 0 auto 14px; border-radius: 50%; background: #e1fdf3; color: #16855b; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800;\">✓<\u002Fdiv>\n                  <div style=\"font-size: 22px; font-weight: 800; color: #16855b; margin-bottom: 6px;\">Course completed<\u002Fdiv>\n                  <div style=\"font-size: 15px; line-height: 1.55; color: #676d73;\">Your completion has been recorded. Nice work handling objections like a consultant, not a seller.<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== FOOTER NAV ===== -->\n    <div style=\"border-top: 1px solid #e9eced; background: #fff; padding: 16px 40px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;\">\n      <button style=\"{{ backStyle }}\" sc-camel-on-click=\"{{ onBack }}\">Back<\u002Fbutton>\n      <div style=\"font-size: 13px; color: #979ba0; text-align: center;\">{{ footerLabel }}<\u002Fdiv>\n      <button style=\"{{ nextStyle }}\" sc-camel-on-click=\"{{ onNext }}\">{{ nextLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    step: 0, maxStep: 0,\n    flips: {},\n    adrc: 'A',\n    scen: { idx: 0, ans: {}, done: {}, finished: false },\n    chat: { step: 0, msgs: null, tip: '', done: false },\n    completed: false,\n    quiz: { idx: 0, picks: {}, done: {}, finished: false },\n  };\n\n  // ---------- structure ----------\n  get outline() {\n    return [\n      { title: 'Welcome', subs: ['Welcome'] },\n      { title: 'Why objections happen', subs: ['Three reasons', 'Objection vs. rejection', 'The right mindset'] },\n      { title: 'The ADRC framework', subs: ['A simple way', 'The framework', 'The Confirm step', 'Consultant, not seller'] },\n      { title: 'Tone & language', subs: ['Tone & language'] },\n      { title: 'Reading the signal', subs: ['Core patterns', 'Root causes', 'Common objections'] },\n      { title: 'Practice scenarios', subs: ['Practice scenarios'] },\n      { title: 'Live conversation', subs: ['Live conversation'] },\n      { title: 'Bring it together', subs: ['Spot the mistake', 'Stronger vs. weaker', 'Recovery', 'Recap'] },\n      { title: 'Knowledge check', subs: ['Knowledge check'] },\n      { title: 'Wrap up', subs: ['Wrap up'] },\n    ];\n  }\n  get stepList() {\n    return [\n      { id: 'welcome', ch: 0 },\n      { id: 'why_reasons', ch: 1 }, { id: 'why_objVsRej', ch: 1 }, { id: 'why_mindset', ch: 1 },\n      { id: 'adrc_simple', ch: 2 }, { id: 'adrc_framework', ch: 2 }, { id: 'adrc_confirm', ch: 2 }, { id: 'adrc_consultant', ch: 2 },\n      { id: 'tone', ch: 3 },\n      { id: 'signal_patterns', ch: 4 }, { id: 'signal_roots', ch: 4 }, { id: 'signal_common', ch: 4 },\n      { id: 'scenarios', ch: 5 },\n      { id: 'live', ch: 6 },\n      { id: 'bring_spot', ch: 7 }, { id: 'bring_sw', ch: 7 }, { id: 'bring_recover', ch: 7 }, { id: 'bring_recap', ch: 7 },\n      { id: 'quiz', ch: 8 },\n      { id: 'wrapup', ch: 9 },\n    ];\n  }\n\n  // ---------- content data ----------\n  get objectivesData() {\n    return [\n      'Identify what a common objection is most likely signaling',\n      'Apply a repeatable framework to structure any response',\n      'Choose a response that keeps trust intact and moves forward',\n      'Spot responses that sound flat, robotic, or transactional',\n      'Recover when a conversation has already gone sideways',\n    ];\n  }\n  get causesData() {\n    return [\n      { title: 'Fear of the wrong choice', body: 'They\\u2019re worried about committing to something that won\\u2019t work out. The stakes feel real \\u2014 money, time, or trust.' },\n      { title: 'Lack of information', body: 'They don\\u2019t have enough to feel confident \\u2014 what to expect, how the process works, or what they\\u2019re actually getting.' },\n      { title: 'Past bad experiences', body: 'They\\u2019ve been let down before by a contractor, a platform, or a process. Their hesitation is protective, not personal.' },\n    ];\n  }\n  get mindsetData() {\n    return [\n      { head: 'Not personal.', body: 'The customer is reacting to their own situation and fears \\u2014 not to you as a person.' },\n      { head: 'Not a reflection on your ability.', body: 'Strong specialists get objections too. What matters is how you respond.' },\n      { head: 'Not the end of the conversation.', body: 'An objection means they\\u2019re still engaged \\u2014 they\\u2019re giving you a chance to help.' },\n    ];\n  }\n  get simpleStepsData() {\n    return [\n      { n: 1, head: 'Hear the concern', body: 'Notice the objection without reacting defensively.' },\n      { n: 2, head: 'Identify what\\u2019s underneath it', body: 'What is the customer unsure about, worried about, or resisting?' },\n      { n: 3, head: 'Respond to help them move forward', body: 'Choose language that stays human, relevant, and useful.' },\n    ];\n  }\n  get adrcData() {\n    return [\n      { letter: 'A', name: 'Acknowledge', body: 'Validate the concern without arguing. Showing you heard them immediately lowers defensiveness and shifts the dynamic to collaborative.' },\n      { letter: 'D', name: 'Drill down', body: 'Ask open-ended questions to uncover the root cause. Most objections are vague \\u2014 drill down to understand what\\u2019s really driving the hesitation.' },\n      { letter: 'R', name: 'Respond', body: 'Address the objection directly with a solution or explanation that resolves the specific concern the customer raised.' },\n      { letter: 'C', name: 'Confirm', body: 'Ensure the objection has been satisfactorily addressed before moving on. Don\\u2019t assume \\u2014 check in.' },\n    ];\n  }\n  get confirmData() {\n    return ['Does that help clarify things for you?', 'Does that address what you were concerned about?', 'Is there anything else you\\u2019d like to know before we move forward?'];\n  }\n  get avoidData() {\n    return [\n      { phrase: 'Actually\\u2026', why: 'Sounds corrective and defensive.' },\n      { phrase: 'You should\\u2026', why: 'Sounds prescriptive and pushy.' },\n      { phrase: 'That\\u2019s not really how it works\\u2026', why: 'Dismisses the customer\\u2019s understanding.' },\n      { phrase: 'A lot of people feel that way\\u2026', why: 'Generic and distancing.' },\n      { phrase: 'I understand, but\\u2026', why: 'The \\u201Cbut\\u201D cancels the acknowledgment.' },\n    ];\n  }\n  get useData() {\n    return [\n      { phrase: 'That makes sense\\u2026', why: 'Validates without over-agreeing.' },\n      { phrase: 'What would help you feel more confident about\\u2026?', why: 'Opens the door.' },\n      { phrase: 'What specifically feels uncertain for you?', why: 'Diagnoses the real concern.' },\n      { phrase: 'I hear that\\u2026', why: 'Human and present.' },\n      { phrase: 'What would need to be different for this to feel right?', why: 'Forward-moving.' },\n    ];\n  }\n  get corePatternsData() {\n    return [\n      { n: 1, title: 'Uncertainty', quote: '\\u201CI\\u2019m not sure this is what I need.\\u201D', body: 'The customer lacks enough information to feel confident.' },\n      { n: 2, title: 'Timing hesitation', quote: '\\u201CI\\u2019m not ready to do this yet.\\u201D', body: 'They aren\\u2019t opposed \\u2014 they\\u2019re stalling.' },\n      { n: 3, title: 'Trust or resistance', quote: '\\u201CI don\\u2019t know if this is really worth it.\\u201D', body: 'Past experiences or skepticism are driving the hesitation.' },\n    ];\n  }\n  get rootData() {\n    return [\n      { tag: 'Value mismatch', color: '#492782', bg: '#f5efff', title: 'Cost vs. return', body: 'They don\\u2019t see a clear connection between what they\\u2019re spending and what they get back.' },\n      { tag: 'Conversion gap', color: '#005979', bg: '#eaf6fa', title: 'Interest, no results', body: 'They\\u2019re engaging but not converting \\u2014 often a positioning, pricing, or follow-through issue.' },\n      { tag: 'Workflow problem', color: '#714601', bg: '#fdf7e7', title: 'Missed timing', body: 'Their tools or habits aren\\u2019t set up to respond when opportunities arise.' },\n      { tag: 'Setup or tool gap', color: '#16855b', bg: '#e1fdf3', title: 'Unused features', body: 'They aren\\u2019t using available features that would directly address their pain point.' },\n    ];\n  }\n  get commonObjData() {\n    return [\n      { obj: 'I\\u2019m not ready yet \\u2014 just want quotes.', signal: 'Timing hesitation', signalColor: '#714601', signalBg: '#fdf7e7', resp: 'That\\u2019s totally fine. When are you planning to move forward? We can work around your timeline.' },\n      { obj: 'I\\u2019m busy right now.', signal: 'Timing hesitation', signalColor: '#714601', signalBg: '#fdf7e7', resp: 'So sorry for catching you at a bad time. This will only take three minutes \\u2014 or when\\u2019s the best time to reconnect?' },\n      { obj: 'It costs too much / I can\\u2019t afford that.', signal: 'Value mismatch', signalColor: '#492782', signalBg: '#f5efff', resp: 'That\\u2019s a completely fair point. Is the concern more about upfront cost, or not yet seeing how this will pay off?' },\n      { obj: 'I\\u2019ve had bad experiences before.', signal: 'Trust / past experience', signalColor: '#005979', signalBg: '#eaf6fa', resp: 'That sounds frustrating \\u2014 what happened? I want to make sure we address that concern directly.' },\n    ];\n  }\n  get swData() {\n    return [\n      { key: 'sw0', quote: 'I\\u2019m not sure this is worth the cost.', stronger: 'What would make this feel worth it for your project? Help me understand what you\\u2019re comparing it to.', weaker: 'Our pricing is competitive and reflects the quality of our service.', weakWhy: 'Too generic \\u2014 doesn\\u2019t engage the real concern.' },\n      { key: 'sw1', quote: 'I\\u2019ve had bad experiences with contractors before.', stronger: 'That sounds frustrating \\u2014 what happened? I want to make sure we address that directly.', weaker: 'Actually, our pros are vetted and highly rated.', weakWhy: 'Dismissive \\u2014 jumps to reassurance without listening.' },\n      { key: 'sw2', quote: 'I need to think about it.', stronger: 'Of course \\u2014 what\\u2019s the main thing you\\u2019re still working through? I want to make sure you have what you need.', weaker: 'OK, no problem. Just let me know!', weakWhy: 'Too passive \\u2014 exits without understanding the concern.' },\n      { key: 'sw3', quote: 'Customers can\\u2019t afford my pricing.', stronger: 'When a lead says that, what does your response usually include \\u2014 do you explain what\\u2019s included and why it\\u2019s worth it?', weaker: 'You might need to lower your rates to stay competitive.', weakWhy: 'Accepts the framing without diagnosing the real issue.' },\n    ];\n  }\n  get spotData() {\n    return [\n      { key: 'sp0', said: 'I\\u2019ve had bad experiences before.', reply: 'Actually, our people are vetted and highly rated \\u2014 you don\\u2019t need to worry about that.', mistake: 'Defending instead of listening', why: '\\u201CActually\\u201D sounds dismissive. The specialist jumped to reassurance without acknowledging the real experience.', better: 'That sounds frustrating \\u2014 what happened? I want to make sure we address that concern directly.' },\n      { key: 'sp1', said: 'I\\u2019m not sure this is worth the cost.', reply: 'Well, here\\u2019s how our pricing works \\u2014 we charge based on the type of work, people set their own rates\\u2026', mistake: 'Over-explaining', why: 'They flooded the person with information instead of understanding what \\u201Cworth it\\u201D means to them.', better: 'What would make this feel worth it for your situation? Help me understand what you\\u2019re comparing it to.' },\n      { key: 'sp2', said: 'I need to think about it.', reply: 'OK, no problem. Just let me know!', mistake: 'Going passive', why: 'The specialist accepted the objection without understanding what\\u2019s underneath it. The conversation is now stalled.', better: 'Of course \\u2014 what\\u2019s the main thing you\\u2019re still working through? I want to make sure you have what you need to decide.' },\n      { key: 'sp3', said: 'I\\u2019m not sure this is really worth doing right now.', reply: 'It actually is worth doing, and I can explain why.', mistake: 'Jumping to convincing', why: 'The specialist skipped diagnosis entirely and went straight to persuasion before understanding what\\u2019s driving the hesitation.', better: 'I understand why you might feel unsure right now. What about this is feeling less worth it at the moment?' },\n    ];\n  }\n  get objRejData() {\n    return [\n      { key: 'or0', tag: 'An objection', tagColor: '#005979', tagBg: '#eaf6fa', title: 'Still in the conversation', body: 'A concern, a question, or a hesitation \\u2014 but they haven\\u2019t left. This is an invitation to help.', backTag: 'Sounds like', backColor: '#005979', backBg: '#eaf6fa', lines: ['\\u201CI\\u2019m not sure this is right for me.\\u201D', '\\u201CI need more time.\\u201D', '\\u201CI don\\u2019t know if I can trust this.\\u201D'] },\n      { key: 'or1', tag: 'A rejection', tagColor: '#b22d31', tagBg: '#ffeff0', title: 'A decision to stop', body: 'They\\u2019re not asking for help \\u2014 they\\u2019re ending the conversation.', backTag: 'Sounds like', backColor: '#b22d31', backBg: '#ffeff0', lines: ['\\u201CI\\u2019m not interested.\\u201D', '\\u201CPlease don\\u2019t contact me again.\\u201D', '\\u201CI\\u2019ve already made my decision.\\u201D'] },\n    ];\n  }\n  get recoveryData() {\n    return [\n      { head: 'Acknowledge what happened', body: 'Name the shift without a dramatic apology. \\u201CI think I jumped ahead there \\u2014 let me back up.\\u201D It resets the tone.' },\n      { head: 'Return to the concern', body: 'Go back to what they said before things went sideways. Returning to their words shows you were listening.' },\n      { head: 'Slow down', body: 'Recovery conversations need more space, not less. Resist filling silence or rushing to a resolution.' },\n    ];\n  }\n  get takeawaysData() {\n    return [\n      'Objections are signals, not rejections \\u2014 invitations to help.',\n      'ADRC keeps you grounded: Acknowledge \\u2192 Drill Down \\u2192 Respond \\u2192 Confirm.',\n      'Tone matters as much as content \\u2014 stay curious, not defensive.',\n      'Diagnose before you respond \\u2014 most objections are vague on the surface.',\n      'Recovery is possible \\u2014 name the shift and return to the concern.',\n    ];\n  }\n  get scenData() {\n    return [\n      { quote: 'It costs too much. I can\\u2019t afford that right now.', prompt: 'You\\u2019ve acknowledged the frustration. Which response best diagnoses the concern?',\n        opts: [\n          { text: 'I understand \\u2014 lead costs can feel high. Let me see if I can get you a discount.', correct: false, ex: 'This skips diagnosis and jumps to a concession. It doesn\\u2019t help them understand or fix the underlying issue.' },\n          { text: 'Help me understand \\u2014 is the concern more about the upfront cost, or not yet seeing how it\\u2019ll pay off in new business?', correct: true, ex: 'Exactly right. This diagnoses whether the issue is cash flow or a value gap \\u2014 two different problems that need different responses.' },\n          { text: 'Pricing is set by the market \\u2014 there\\u2019s not much we can do about that.', correct: false, ex: 'Accurate but unhelpful. It closes the conversation and is likely to cause disengagement.' },\n          { text: 'Have you tried lowering your budget to reduce spend?', correct: false, ex: 'Reducing budget reduces opportunity. This doesn\\u2019t address why things aren\\u2019t converting.' },\n        ] },\n      { quote: 'I\\u2019ve spent a lot and never got results. What\\u2019s the point?', prompt: 'You\\u2019ve acknowledged the frustration. What\\u2019s the best next move?',\n        opts: [\n          { text: 'That\\u2019s really unfortunate. Let me escalate this to our billing team.', correct: false, ex: 'This is a conversion problem, not a billing problem. Escalating delays the coaching conversation they actually need.' },\n          { text: 'Some categories are just more competitive \\u2014 it may not be the right fit.', correct: false, ex: 'Dismissive and unhelpful. It doesn\\u2019t diagnose whether the issue is fixable.' },\n          { text: 'Let\\u2019s look at this together. Can you walk me through what you\\u2019ve been doing and what results you\\u2019ve been seeing?', correct: true, ex: 'The right move. It opens a diagnostic conversation and puts the focus on understanding before jumping to solutions.' },\n          { text: 'I\\u2019d recommend pausing your account until things pick up.', correct: false, ex: 'Pausing removes them from the marketplace without solving anything \\u2014 it accelerates disengagement.' },\n        ] },\n      { quote: 'I\\u2019m just not sure this is the right time for me.', prompt: 'Using the ADRC framework, what should you do first?',\n        opts: [\n          { text: 'Explain why now is actually a great time to move forward.', correct: false, ex: 'This skips to responding without hearing the concern. The framework starts with listening, not persuading.' },\n          { text: 'Ask them to reach back out when they\\u2019re ready.', correct: false, ex: 'This exits prematurely. They\\u2019re still engaged \\u2014 this is an objection, not a rejection.' },\n          {
